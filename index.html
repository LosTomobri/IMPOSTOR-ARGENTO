                        <div className={`p-4 rounded-xl border-2 border-purple-500 ${isLightMode ? 'bg-white' : 'bg-gray-900'}`}>
                          <div className={`${isLightMode ? 'text-gray-800' : 'text-white'} text-sm font-bold mb-1`}>Jugador 3</div>
                          <div className={`${isLightMode ? 'text-gray-600' : 'text-gray-300'} text-xs`}>Toca para revelar</div>
                        </div>
                        <div className={`p-4 rounded-xl border-2 border-purple-500 ${isLightMode ? 'bg-white' : 'bg-gray-900'}`}>
                          <div className={`${isLightMode ? 'text-gray-800' : 'text-white'} text-sm font-bold mb-1`}>Jugador 4</div>

                  ) : howToPlayStep === 2 ? (
                    <div className={`p-4 sm:p-6 rounded-xl ${isLightMode ? 'bg-gray-50' : 'bg-gray-800'}`}>
                      <h3 className={`text-lg sm:text-xl font-bold mb-2 ${isLightMode ? 'text-gray-800' : 'text-white'}`}>3) Discusión</h3>
                      <p className={`text-sm sm:text-base mb-4 ${isLightMode ? 'text-gray-700' : 'text-gray-300'}`}>
                        En sentido horario, cada jugador dice una palabra relacionada con la palabra secreta (sin decirla).
                      </p>
                      <div className="space-y-2">
                        <div className={`p-3 rounded-xl ${isLightMode ? 'bg-white border border-gray-200' : 'bg-gray-900 border border-gray-700'}`}>
                          <div className={`${isLightMode ? 'text-gray-800' : 'text-white'} text-sm font-bold`}>Jugador 1</div>
                          <div className={`${isLightMode ? 'text-gray-600' : 'text-gray-300'} text-sm`}>"Mascota"</div>
                        </div>
                        <div className={`p-3 rounded-xl ${isLightMode ? 'bg-white border border-gray-200' : 'bg-gray-900 border border-gray-700'}`}>
                          <div className={`${isLightMode ? 'text-gray-800' : 'text-white'} text-sm font-bold`}>Jugador 2</div>
                          <div className={`${isLightMode ? 'text-gray-600' : 'text-gray-300'} text-sm`}>"Ladra"</div>
                        </div>
                        <div className={`p-3 rounded-xl ${isLightMode ? 'bg-white border border-gray-200' : 'bg-gray-900 border border-gray-700'}`}>
                          <div className={`${isLightMode ? 'text-gray-800' : 'text-white'} text-sm font-bold`}>Jugador 3</div>
                          <div className={`${isLightMode ? 'text-gray-600' : 'text-gray-300'} text-sm`}>"Parque"</div>
                        </div>

                    </div>
                  ) : howToPlayStep === 3 ? (
                    <div className={`p-4 sm:p-6 rounded-xl ${isLightMode ? 'bg-gray-50' : 'bg-gray-800'}`}>
                      <h3 className={`text-lg sm:text-xl font-bold mb-2 ${isLightMode ? 'text-gray-800' : 'text-white'}`}>4) Votación</h3>
                      <p className={`text-sm sm:text-base mb-4 ${isLightMode ? 'text-gray-700' : 'text-gray-300'}`}>
                        Luego discuten y votan para eliminar al más sospechoso.
                      </p>
                      <div className="grid grid-cols-2 gap-2 sm:gap-3">
                        <button className="px-4 py-3 rounded-xl font-bold text-sm bg-gradient-to-r from-purple-600 to-pink-600 text-white">Votar Jugador 2</button>
                        <button className="px-4 py-3 rounded-xl font-bold text-sm bg-gradient-to-r from-purple-600 to-pink-600 text-white">Votar Jugador 3</button>
                        <button className="px-4 py-3 rounded-xl font-bold text-sm bg-gradient-to-r from-purple-600 to-pink-600 text-white">Votar Jugador 4</button>
                        <button className="px-4 py-3 rounded-xl font-bold text-sm bg-gradient-to-r from-purple-600 to-pink-600 text-white">Votar Jugador 5</button>
                      </div>
                    </div>
                  ) : (
                    <>
                      {/* Condiciones de victoria */}
                      <div className={`p-4 sm:p-6 rounded-xl ${isLightMode ? 'bg-gray-50' : 'bg-gray-800'} mb-4`}>
                        <h3 className={`text-lg sm:text-xl font-bold mb-2 ${isLightMode ? 'text-gray-800' : 'text-white'}`}>5) ¿Quién gana?</h3>
                        <p className={`text-sm sm:text-base ${isLightMode ? 'text-gray-700' : 'text-gray-300'}`}>
                          Los jugadores intentan descubrir a los impostores. Los impostores intentan sobrevivir hasta igualar o superar la cantidad de jugadores honestos.
                        </p>
                      </div>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                        <div className={`p-3 sm:p-4 md:p-5 rounded-lg sm:rounded-xl border-2 ${isLightMode ? 'bg-yellow-50 border-yellow-400' : 'bg-gray-800 border-yellow-500'}`}>
                          <h3 className={`text-base sm:text-lg md:text-xl font-bold mb-1 sm:mb-2 ${isLightMode ? 'text-yellow-700' : 'text-yellow-400'}`}>
                            ✓ JUGADOR
                          </h3>
                          <p className={`text-xs sm:text-sm md:text-base ${isLightMode ? 'text-gray-700' : 'text-gray-300'}`}>
                            Los jugadores ganan si eliminan a todos los impostores
                          </p>
                        </div>

                        <div className={`p-3 sm:p-4 md:p-5 rounded-lg sm:rounded-xl border-2 ${isLightMode ? 'bg-red-50 border-red-400' : 'bg-gray-800 border-red-500'}`}>
                          <h3 className={`text-base sm:text-lg md:text-xl font-bold mb-1 sm:mb-2 ${isLightMode ? 'text-red-700' : 'text-red-400'}`}>
                            ✗ IMPOSTOR
                          </h3>
                          <p className={`text-xs sm:text-sm md:text-base ${isLightMode ? 'text-gray-700' : 'text-gray-300'}`}>
                            Los impostores ganan si igualan o superan a los jugadores
                          </p>
                        </div>
                      </div>
                    </>
                  )}
                </div>

                <div className="mt-4 sm:mt-6 flex flex-col gap-3">
                  <div className="flex justify-center">
                    <button
                      onClick={() => setHowToPlayStep((prev) => Math.max(0, prev - 1))}
                      disabled={howToPlayStep === 0}
                      className={`px-8 sm:px-10 py-2.5 sm:py-3 rounded-lg sm:rounded-xl font-semibold transition-all duration-300 shadow-lg text-sm sm:text-base ${
                        howToPlayStep === 0
                          ? 'bg-gray-600 cursor-not-allowed opacity-50'
                          : (isLightMode ? 'bg-gray-200 hover:bg-gray-300 text-gray-800' : 'bg-gray-700 hover:bg-gray-600 text-white')
                      }`}
                    >
                      Anterior
                    </button>
                  </div>

                  <div className="flex gap-2 sm:gap-3">
                    <button
                      onClick={() => setShowHowToPlayModal(false)}
                      className={`flex-1 px-4 sm:px-6 py-2.5 sm:py-3 rounded-lg sm:rounded-xl font-semibold transition-all duration-300 shadow-lg text-sm sm:text-base ${
                        isLightMode 
                          ? 'bg-gray-200 hover:bg-gray-300 text-gray-800' 
                          : 'bg-gray-700 hover:bg-gray-600 text-white'
                      }`}
                    >
                      Cerrar
                    </button>
                    <button
                      onClick={() => {
                        if (howToPlayStep >= 4) {
                          setShowHowToPlayModal(false);
                        } else {
                          setHowToPlayStep((prev) => Math.min(4, prev + 1));
                        }
                      }}
                      className="flex-1 px-4 sm:px-6 py-2.5 sm:py-3 rounded-lg sm:rounded-xl font-semibold transition-all duration-300 shadow-lg text-sm sm:text-base bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white"
                    >
                      {howToPlayStep >= 4 ? 'Listo' : 'Siguiente'}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
        </>
      );
    }

    // Flag para prevenir múltiples inicializaciones
    let appInitialized = false;
    let retryCount = 0;
    const MAX_RETRIES = 3; // Solo 3 reintentos

    // Verificar que todas las dependencias estén cargadas (SIMPLIFICADO)
    function checkDependencies() {
      return typeof React !== 'undefined' && 
             typeof ReactDOM !== 'undefined' && 
             (typeof ReactDOM.createRoot !== 'undefined' || typeof ReactDOM.render !== 'undefined');
    }

    // Mostrar mensaje de error
    function showError(message, details = '') {
      console.error('Showing error:', message, details);
      const rootEl = document.getElementById('root');
      if (rootEl) {
        // Forzar eliminar pantalla de carga primero
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          loadingScreen.style.display = 'none';
        }
        document.body.classList.remove('loading');
        document.documentElement.classList.remove('loading');
        
        // Mostrar error con fondo visible
        rootEl.innerHTML = `
          <div style="padding: 20px; text-align: center; color: white; background: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 999999;">
            <h1 style="color: #9333ea; margin-bottom: 20px; font-size: 24px;">⚠️ Error de Carga</h1>
            <p style="margin-bottom: 10px; font-size: 16px; max-width: 500px;">${message}</p>
            ${details ? `<p style="margin-bottom: 20px; font-size: 14px; color: #999; max-width: 500px;">${details}</p>` : ''}
            <button onclick="location.reload()" style="padding: 12px 24px; background: #9333ea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; font-weight: bold;">
              🔄 Recargar Página
            </button>
            <p style="margin-top: 20px; font-size: 12px; color: #666;">Si el problema persiste, verifica tu conexión a internet</p>
          </div>
        `;
      }
    }

    // Actualizar indicador de carga (ya no se usa, pero se mantiene por compatibilidad)
    function updateLoadingMessage(message) {
      // Ya no actualizamos el mensaje, solo mantenemos la animación
      console.log('Cargando:', message);
    }

    // Esperar a que los scripts se carguen e inicializar la app (SIMPLIFICADO)
    function initApp() {
      console.log('🔧 initApp llamado, appInitialized:', appInitialized, 'retryCount:', retryCount);
      if (appInitialized) {
        console.log('⚠️ App ya inicializada, saliendo');
        return;
      }

      if (window.__INIT_IN_PROGRESS__) {
        console.log('⚠️ initApp ya en progreso, saliendo');
        return;
      }
      window.__INIT_IN_PROGRESS__ = true;

      // Verificar dependencias
      const depsReady = checkDependencies();
      console.log('📦 Dependencias:', {
        React: typeof React !== 'undefined',
        ReactDOM: typeof ReactDOM !== 'undefined',
        createRoot: typeof ReactDOM?.createRoot !== 'undefined',
        render: typeof ReactDOM?.render !== 'undefined',
        ready: depsReady
      });
      
      if (!depsReady) {
        retryCount++;
        console.log('⏳ Reintentando cargar dependencias... intento', retryCount, 'de', MAX_RETRIES);
        if (retryCount > MAX_RETRIES) {
          console.error('❌ No se pudieron cargar las dependencias después de', MAX_RETRIES, 'intentos');
          showError('Error al cargar recursos', 'Las librerías necesarias no se pudieron cargar. Por favor, verifica tu conexión a internet y recarga la página.');
          return;
        }
        setTimeout(initApp, 800);
        return;
      }

      try {
        const rootElement = document.getElementById('root');
        if (!rootElement) {
          console.error('❌ Root element no encontrado');
          retryCount++;
          window.__INIT_IN_PROGRESS__ = false;
          if (retryCount <= MAX_RETRIES) {
            setTimeout(initApp, 120);
            return;
          }
          throw new Error('Root element not found');
        }

        console.log('✅ Inicializando app con React...');

        // Ocultar pantalla de carga
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          console.log('🌟 Ocultando pantalla de carga...');
          setTimeout(() => {
            loadingScreen.classList.add('hidden');
            document.documentElement.classList.remove('loading');
            document.body.classList.remove('loading');
            setTimeout(() => {
              loadingScreen.style.display = 'none';
              console.log('✅ Pantalla de carga oculta');
            }, 300);
          }, 100);
        }

        // Renderizar app
        console.log('🎨 Renderizando componente ImpostorGame...');
        if (typeof ReactDOM.createRoot !== 'undefined') {
          console.log('📱 Usando ReactDOM.createRoot (React 18+)');
          const root = ReactDOM.createRoot(rootElement);
          root.render(<ImpostorGame />);
        } else {
          console.log('📱 Usando ReactDOM.render (React 17)');
          ReactDOM.render(<ImpostorGame />, rootElement);
        }
        appInitialized = true;
        window.__APP_INITIALIZED__ = true;
        window.__INIT_IN_PROGRESS__ = false;
        console.log('✅ App inicializada correctamente!');
      } catch (error) {
        console.error('❌ Error al inicializar:', error);
        console.error('Stack trace:', error.stack);
        window.__INIT_IN_PROGRESS__ = false;
        showError('Error al inicializar la aplicación', 'Detalles técnicos: ' + error.message);
      }
    }

    // Estrategia de inicialización SIMPLIFICADA
    function startInitialization() {
      console.log('🚀 Iniciando app...');
      console.log('🌐 User Agent:', navigator.userAgent);
      console.log('💻 Navegador:', {
        isChrome: /Chrome/.test(navigator.userAgent),
        isFirefox: /Firefox/.test(navigator.userAgent),
        isSafari: /Safari/.test(navigator.userAgent) && !/Chrome/.test(navigator.userAgent),
        isEdge: /Edge/.test(navigator.userAgent)
      });

      if ('serviceWorker' in navigator) {
        try {
          navigator.serviceWorker.register('./sw.js').then((reg) => {
            try {
              if (reg && reg.waiting && navigator.serviceWorker.controller) {
                reg.waiting.postMessage({ type: 'SKIP_WAITING' });
              }
              reg.addEventListener('updatefound', () => {
                const installing = reg.installing;
                if (!installing) return;
                installing.addEventListener('statechange', () => {
                  if (installing.state === 'installed' && navigator.serviceWorker.controller) {
                    Promise.resolve(navigator.serviceWorker.getRegistration()).then((r) => {
                      if (r && r.waiting) r.waiting.postMessage({ type: 'SKIP_WAITING' });
                    });
                  }
                });
              });
            } catch (e) {
              console.warn('[SW] register handler error', e);
            }
          }).catch((e) => {
            console.warn('[SW] register failed', e);
          });
        } catch (e) {
          console.warn('[SW] register error', e);
        }
      }
      
      // FAILSAFE: Forzar ocultar pantalla después de 3 segundos
      setTimeout(() => {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen && !loadingScreen.classList.contains('hidden')) {
          console.warn('⚠️ Timeout: forzando ocultar pantalla');
          loadingScreen.classList.add('hidden');
          document.documentElement.classList.remove('loading');
          document.body.classList.remove('loading');
          setTimeout(() => loadingScreen.style.display = 'none', 300);
        }
      }, 3000);
      
      // Inicializar cuando el DOM esté listo
      if (document.readyState !== 'loading') {
        console.log('📝 DOM ya cargado, inicializando...');
        setTimeout(initApp, 50);
      } else {
        console.log('⏳ Esperando DOMContentLoaded...');
        document.addEventListener('DOMContentLoaded', () => {
          console.log('✅ DOMContentLoaded disparado');
          setTimeout(initApp, 50);
        });
      }
    }

    // Iniciar el proceso
    startInitialization();

  </script>
