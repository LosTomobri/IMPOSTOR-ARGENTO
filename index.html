        setToasts(prev => [...prev, { id, message, type, duration }]);
        return id;
      };

        setToasts(prev => prev.filter(toast => toast.id !== id));
      };

              message={toast.message}
              type={toast.type}
              duration={toast.duration}

      );

        // Si está en modo standalone, definitivamente está instalada
        if (isStandalone || isIOSStandalone || isInWebApp) {
          return true;

        // Si no está en modo standalone pero localStorage dice que estaba instalada,
        // verificar si realmente sigue instalada (puede haber sido desinstalada)
        const wasInstalled = localStorage.getItem('pwa_installed') === 'true';
        if (wasInstalled) {

      const selectFirstPlayerAndStartDiscussion = () => {
        // Seleccionar el primer jugador
        let eligiblePlayers = gameStarted;
        // Si la opción está activada, excluir a los impostores
        if (impostorNeverFirst) {
          eligiblePlayers = gameStarted.filter(p => !p.isImpostor);
        } else {
          // Si la opción está desactivada, 15% de probabilidad de elegir un impostor
          const impostors = gameStarted.filter(p => p.isImpostor);
          const honestPlayers = gameStarted.filter(p => !p.isImpostor);
          const chance = Math.random() * 100;
          
          if (chance < 15 && impostors.length > 0) {
            // 15% de probabilidad: elegir un impostor
            eligiblePlayers = impostors;
          } else if (honestPlayers.length > 0) {
            // 85% de probabilidad: elegir un jugador honesto
            eligiblePlayers = honestPlayers;
          }
          // Si no hay jugadores honestos (todos son impostores), usar todos
          if (eligiblePlayers.length === 0) {
            eligiblePlayers = gameStarted;
          }
        }
        
        // REGLA DE BALANCE: Cómplice no puede hablar primero en la primera ronda
        // Excluir al cómplice de los jugadores elegibles para hablar primero
        eligiblePlayers = eligiblePlayers.filter(p => !p.isAccomplice);
        
        // Si no hay jugadores elegibles después de excluir al cómplice, usar todos excepto cómplice
        if (eligiblePlayers.length === 0) {
          eligiblePlayers = gameStarted.filter(p => !p.isAccomplice);
        }
        
        // Si aún no hay jugadores (todos son cómplices, caso extremo), usar todos
        if (eligiblePlayers.length === 0) {
          eligiblePlayers = gameStarted;
        }
        
        const randomFirst = eligiblePlayers[Math.floor(Math.random() * eligiblePlayers.length)].number;
        setFirstPlayer(randomFirst);

      const updateStreakOnGameEnd = () => {
        const currentGames = parseInt(localStorage.getItem('impostorGame_gamesPlayed') || '0');
        const newGamesPlayed = currentGames + 1;
        
        setGamesPlayed(newGamesPlayed);
        localStorage.setItem('impostorGame_gamesPlayed', newGamesPlayed.toString());

        const now = Date.now();
        const savedStreak = parseInt(localStorage.getItem('impostorGame_streak') || '0');
        const savedLastActive = parseInt(localStorage.getItem('impostorGame_streakLastActiveTs') || '0');
        const elapsed = savedLastActive > 0 ? (now - savedLastActive) : null;

        let nextStreak = savedStreak;
        let nextLastActive = savedLastActive;

        if (!savedLastActive || savedStreak <= 0) {
          nextStreak = 1;
          nextLastActive = now;
        } else if (elapsed != null && elapsed < 24 * 60 * 60 * 1000) {
          nextStreak = savedStreak;
          nextLastActive = savedLastActive;
        } else if (elapsed != null && elapsed <= 48 * 60 * 60 * 1000) {
          nextStreak = savedStreak + 1;
          nextLastActive = now;
        } else {
          nextStreak = 1;
          nextLastActive = now;
        }

        setStreak(nextStreak);
        setStreakLastActiveTs(nextLastActive);
        localStorage.setItem('impostorGame_streak', nextStreak.toString());
        localStorage.setItem('impostorGame_streakLastActiveTs', nextLastActive.toString());
        setRecoveryUsed(false);
        localStorage.setItem('impostorGame_recoveryUsed', 'false');
      };

          const elapsed = now - savedLastActive;

        const containerRef = React.useRef(null);
        const innerRef = React.useRef(null);
        const heightRef = React.useRef(0);
        const prevOpenRef = React.useRef(open);
        const isInitialMountRef = React.useRef(true);
        
        React.useEffect(() => {
          if (!containerRef.current || !innerRef.current) return;
          
          const container = containerRef.current;
          const inner = innerRef.current;
          const prevOpen = prevOpenRef.current;
          const isInitialMount = isInitialMountRef.current;
          
          isInitialMountRef.current = false;
          
          // Si no cambió el estado y no es el montaje inicial, no hacer nada
          if (prevOpen === open && !isInitialMount) return;
          
          prevOpenRef.current = open;
          
          if (open) {
            // ABRIR
            if (isInitialMount) {
              // Montaje inicial: establecer altura directamente sin animar
              const targetHeight = inner.scrollHeight;
              heightRef.current = targetHeight;
              container.style.transition = 'none';
              container.style.maxHeight = `${targetHeight}px`;
              setTimeout(() => {
                container.style.removeProperty('transition');
                container.style.maxHeight = 'none';
              }, 50);
            } else {
              // Ya estaba montado: animar
              container.style.transition = 'none';
              container.style.maxHeight = '0px';
              void container.offsetHeight; // Forzar reflow
              
              const targetHeight = inner.scrollHeight;
              heightRef.current = targetHeight;
              
              requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                  // Usar las transiciones CSS definidas
                  container.style.removeProperty('transition');
                  container.style.maxHeight = `${targetHeight}px`;
                  
                  setTimeout(() => {
                    if (container && open) {
                      container.style.transition = 'none';
                      container.style.maxHeight = 'none';
                      container.style.removeProperty('transition');
                    }
                  }, 500);
                });
              });
            }
          } else {
            // CERRAR: Animar a 0
            if (isInitialMount) {
              // Montaje inicial cerrado: establecer a 0 sin animar
              container.style.transition = 'none';
              container.style.maxHeight = '0px';
            } else if (prevOpen) {
              // Ya estaba abierto: animar el cierre
              let currentHeight = heightRef.current;
              
              if (container.style.maxHeight === 'none' || container.style.maxHeight === '') {
                if (currentHeight <= 0) {
                  container.style.transition = 'none';
                  container.style.maxHeight = '9999px';
                  void container.offsetHeight;
                  currentHeight = inner.scrollHeight;
                  heightRef.current = currentHeight;
                }
              } else {
                const parsed = parseInt(container.style.maxHeight);
                if (!isNaN(parsed) && parsed > 0) {
                  currentHeight = parsed;
                }
              }
              
              if (currentHeight > 0) {
                heightRef.current = currentHeight;
                container.style.transition = 'none';
                container.style.maxHeight = `${currentHeight}px`;
                void container.offsetHeight;
                
                requestAnimationFrame(() => {
                  requestAnimationFrame(() => {
                    // Usar las transiciones CSS definidas
                    container.style.removeProperty('transition');
                    container.style.maxHeight = '0px';
                  });
                });
              } else {
                container.style.transition = 'none';
                container.style.maxHeight = '0px';
              }
            }
          }
        }, [open]);
        
        return (

            className={`ia-collapsible ${open ? 'ia-collapsible-open' : ''} ${className}`}

      const RollingDigit = ({ digit, digitClassName = '' }) => {
        const prevRef = React.useRef(digit);
        const [pos, setPos] = React.useState(digit);
        const trackRef = React.useRef(null);
        const rafRef = React.useRef(null);

        React.useLayoutEffect(() => {
          const prev = prevRef.current;
          if (prev === digit) return;
          
          // Limpiar RAF anterior
          if (rafRef.current) {
            cancelAnimationFrame(rafRef.current);
            rafRef.current = null;
          }
          
          const prevNum = Number(prev);
          const newNum = Number(digit);
          
          if (isNaN(prevNum) || isNaN(newNum)) {
            prevRef.current = digit;
            setPos(digit);
            return;
          }
          
          // Establecer posición anterior primero (sin animación)
          setPos(prev);
          prevRef.current = digit;
          
          // Forzar reflow
          if (trackRef.current) {
            void trackRef.current.offsetHeight;
          }
          
          // Luego animar a la nueva posición
          rafRef.current = requestAnimationFrame(() => {
            rafRef.current = requestAnimationFrame(() => {
              setPos(digit);
              rafRef.current = null;
            });
          });
          
          return () => {
            if (rafRef.current) {
              cancelAnimationFrame(rafRef.current);
              rafRef.current = null;
            }
          };
        }, [digit]);

        const offset = -Number(pos);
        return (
          <span className={`ia-roll-digit ${digitClassName}`}>
            <span 
              ref={trackRef}
              className="ia-roll-track" 
              style={{ transform: `translate3d(0, ${offset}em, 0)` }}

      const AnimatedNumber = ({ value, duration = 900, className = '' }) => {
        const ref = React.useRef(null);
        const startedRef = React.useRef(false);
        const [display, setDisplay] = React.useState(0);

        useEffect(() => {
          const to = Number(value);
          if (!Number.isFinite(to)) {
            setDisplay(0);
            return;
          }

          const run = () => {
            const start = performance.now();
            const from = 0;
            const tick = (now) => {
              const p = Math.min((now - start) / duration, 1);
              const eased = 1 - Math.pow(1 - p, 3);
              setDisplay(Math.floor(from + (to - from) * eased));
              if (p < 1) requestAnimationFrame(tick);
            };
            requestAnimationFrame(tick);
          };

          const el = ref.current;
          if (!el || typeof window === 'undefined' || typeof window.IntersectionObserver !== 'function') {
            run();
            return;
          }

          const obs = new IntersectionObserver(
            (entries) => {
              const entry = entries[0];
              if (!entry?.isIntersecting) return;
              if (startedRef.current) return;
              startedRef.current = true;
              run();
              obs.disconnect();
            },
            { threshold: 0.4 }
          );

          obs.observe(el);
          return () => {
            try {
              obs.disconnect();
            } catch (e) {}
          };
        }, [value, duration]);

        return (
          <span ref={ref} className={className}>
            <RollingOdometerText value={display} />
          </span>
        );
      };

          const el = ref.current;
          if (!el) return;

          if (!Number.isFinite(to)) {
            setDisplay(0);
            return;
          }

          // Fallback: browsers sin IntersectionObserver
          if (typeof window === 'undefined' || typeof window.IntersectionObserver !== 'function') {
            setDisplay(to);
            return;
          }

          let obs = null;
          try {
            obs = new IntersectionObserver(
              (entries) => {
                const entry = entries[0];
                if (!entry?.isIntersecting) return;
                if (startedRef.current) return;
                startedRef.current = true;

                const from = 0;
                const start = performance.now();
                const tick = (now) => {
                  const p = Math.min((now - start) / duration, 1);
                  const next = Math.floor(from + (to - from) * p);
                  setDisplay(next);
                  if (p < 1) requestAnimationFrame(tick);
                };
                requestAnimationFrame(tick);
                if (obs) obs.disconnect();
              },
              { threshold: 0.4 }
            );

            obs.observe(el);
          } catch (e) {
            setDisplay(to);
            return;
          }

          return () => {
            try {
              if (obs) obs.disconnect();
            } catch (e) {}
          };
        }, [value, duration]);

            {display}

      const getRecommendedImpostors = (players) => {
        if (players <= 3) return 1;
        if (players <= 5) return 1;
        if (players <= 7) return 2;
        if (players <= 8) return 2;
        if (players <= 10) return 3;
        if (players <= 12) return 4;
        if (players <= 14) return 4;
        if (players <= 16) return 5;
        if (players <= 18) return 5;
        return 6; // 19-20
      };

      const getMaxImpostors = (players) => {
        // Máximo 30% de impostores, pero siempre mínimo 1 y nunca más que jugadores - 1
        const maxPercentage = Math.ceil(players * 0.3);
        return Math.min(maxPercentage, players - 1, Math.max(1, maxPercentage));
      };

      // Calcular el máximo de impostores adicionales según la cantidad de jugadores
      const getMaxAdditionalImpostors = (players, currentImpostors) => {
        const maxImpostors = getMaxImpostors(players);
        // El máximo de adicionales es la diferencia entre el máximo permitido y los impostores actuales
        return Math.max(0, maxImpostors - currentImpostors);
      };

      // Ajustar automáticamente el número de impostores si excede el máximo permitido
      useEffect(() => {
        const maxImpostors = getMaxImpostors(playerCount);
        if (impostorCount > maxImpostors) {
          setImpostorCount(maxImpostors);
        }
      }, [playerCount, impostorCount]);

      // Ajustar automáticamente la cantidad de impostores adicionales si excede el máximo permitido
      // Usar useRef para rastrear si ya se cargó el valor desde localStorage y evitar resetearlo
      const additionalImpostorsCountLoadedRef = React.useRef(false);
      
      // Marcar como cargado cuando se carga desde localStorage
      useEffect(() => {
        const savedOptions = localStorage.getItem('impostorGameOptions');
        if (savedOptions) {
          try {
            const options = JSON.parse(savedOptions);
            if (options.additionalImpostorsCount !== undefined && options.additionalImpostorsCount >= 1) {
              additionalImpostorsCountLoadedRef.current = true;
            }
          } catch (e) {
            // Ignorar errores
          }
        }
      }, []);
      
      useEffect(() => {
        // Solo desactivar automáticamente si hay menos de 5 jugadores (requisito mínimo)
        if (playerCount < 5) {
          if (additionalImpostorsMode) {
            setAdditionalImpostorsMode(false);
          }
          return;
        }
        
        // Validar límite del 50% de impostores + roles especiales juntos
        const currentSpecialRoles = (jesterMode ? 1 : 0) + (accompliceMode ? 1 : 0) + (lostMode ? 1 : 0);
        const maxTotal = Math.floor(playerCount * 0.5);
        const currentTotal = impostorCount + currentSpecialRoles;
        const wouldExceedLimit = currentTotal >= maxTotal;
        
        // Nota: Ya no se fuerza la desactivación automática cuando se alcanza el límite
        // Los botones se deshabilitan mediante wouldExceedLimit para mantener el modo activo
        // pero impedir cambios cuando se alcanza el límite del 50%
        
        // Si el modo está activo y hay 5+ jugadores, solo ajustar el contador si es necesario
        if (additionalImpostorsMode) {
          const maxAdditional = getMaxAdditionalImpostors(playerCount, impostorCount);
          // Validar también contra el límite del 50%
          const additionalImpostorsToCount = (additionalImpostorsProbability > 0) ? additionalImpostorsCount : 0;
          const totalWithImpostors = impostorCount + currentSpecialRoles + additionalImpostorsToCount;
          const wouldExceedWithCurrent = totalWithImpostors > maxTotal;
          
          if (wouldExceedWithCurrent) {
            // Reducir la cantidad para no exceder el límite
            const maxAllowed = Math.max(0, maxTotal - currentTotal);
            if (additionalImpostorsCount > maxAllowed) {
              setAdditionalImpostorsCount(maxAllowed);
            }
            // Si no hay espacio, desactivar el modo
            if (maxAllowed === 0) {
              setAdditionalImpostorsMode(false);
            }
          }
          
          // Solo ajustar si el valor actual excede el máximo permitido
          // No tocar el valor si está dentro del rango válido (1 a maxAdditional) para preservar el valor guardado
          if (maxAdditional > 0) {
            if (additionalImpostorsCount > maxAdditional) {
              // Solo ajustar si excede el máximo
              setAdditionalImpostorsCount(maxAdditional);
            } else if (additionalImpostorsCount < 1 && maxAdditional >= 1) {
              // Solo establecer a 1 si el valor es menor a 1 y hay espacio disponible
              // Pero solo si no se ha cargado desde localStorage (para evitar resetear valores guardados)
              if (!additionalImpostorsCountLoadedRef.current) {
                setAdditionalImpostorsCount(1);
              }
            }
            // Si el valor está entre 1 y maxAdditional, no hacer nada para preservar el valor guardado
          }
          // NO desactivar el modo automáticamente si maxAdditional === 0
          // Permitir que el usuario lo active/desactive manualmente
        }
      }, [playerCount, impostorCount, additionalImpostorsMode, jesterMode, accompliceMode, lostMode, additionalImpostorsCount, additionalImpostorsProbability]);

      // Forzar desactivación automática de modos cuando se alcanza el límite o no hay suficientes jugadores
      useEffect(() => {
        const minPlayersForJester = 5;
        const maxPlayersForJester = 5;
        const canEnableJester = playerCount >= minPlayersForJester && playerCount > maxPlayersForJester;
        const isJesterDisabledByPlayers = !canEnableJester;
        
        const currentSpecialRoles = (accompliceMode ? 1 : 0) + (lostMode ? 1 : 0);
        const additionalImpostorsToCount = (additionalImpostorsMode && additionalImpostorsProbability > 0) ? additionalImpostorsCount : 0;
        const currentTotalSpecial = currentSpecialRoles + additionalImpostorsToCount;
        const maxTotal = Math.floor(playerCount * 0.5);
        const currentTotal = impostorCount + currentTotalSpecial;
        const wouldExceedLimit = !jesterMode && currentTotal >= maxTotal;
        
        if (jesterMode && (isJesterDisabledByPlayers || wouldExceedLimit)) {
          setJesterMode(false);
        }
      }, [playerCount, impostorCount, jesterMode, accompliceMode, lostMode, additionalImpostorsMode, additionalImpostorsCount, additionalImpostorsProbability]);

                                     (impostorCount >= minImpostorsForAccomplice && playerCount > maxPlayersForAccomplice);
        const isAccompliceDisabledByPlayers = !canEnableAccomplice;
        
        const currentSpecialRoles = (jesterMode ? 1 : 0) + (lostMode ? 1 : 0);
        const additionalImpostorsToCount = (additionalImpostorsMode && additionalImpostorsProbability > 0) ? additionalImpostorsCount : 0;
        const currentTotalSpecial = currentSpecialRoles + additionalImpostorsToCount;

      const encodeBase64UrlUtf8 = (obj) => {
        const json = JSON.stringify(obj);
        const bytes = new TextEncoder().encode(json);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) {
          binary += String.fromCharCode(bytes[i]);
        }
        const base64 = btoa(binary);
        return base64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
      };

      const decodeBase64UrlUtf8 = (encoded) => {
        const normalized = encoded.replace(/-/g, '+').replace(/_/g, '/');
        const padLength = (4 - (normalized.length % 4)) % 4;
        const padded = normalized + '='.repeat(padLength);
        const binary = atob(padded);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }
        const json = new TextDecoder().decode(bytes);
        return JSON.parse(json);
      };

        try {
          return decodeBase64UrlUtf8(raw);

          // fallback
        }

        // 2) Compatibilidad con links viejos: base64 estándar (puede venir con espacios en vez de +)
        const legacy = raw.replace(/\s/g, '+');
        const decodedJson = atob(legacy);
        return JSON.parse(decodedJson);

          gamesWithoutTrigger: 0 
        };
        
        // Reset diario (solo si la probabilidad no es >= 100, para permitir pruebas)
        if (data.lastDate !== today && data.probability < 100) {
          data.probability = 0.5;
          data.lastDate = today;
          data.gamesWithoutTrigger = 0;
        } else if (data.lastDate !== today && data.probability >= 100) {
          // Si es >= 100, solo actualizar la fecha pero mantener la probabilidad
          data.lastDate = today;
        }
        
        return data;

          probability: 0.5, 
          lastDate: today, 
          gamesWithoutTrigger: 0 
        };
        
        // Reset diario
        if (data.lastDate !== today) {
          data.probability = 0.5;
          data.lastDate = today;
          data.gamesWithoutTrigger = 0;
        }
        
        if (triggered) {
          // Si se activó, resetear a 0.5%
          data.probability = 0.5  ;
          data.gamesWithoutTrigger = 0;
        } else {
          // Si no se activó, aumentar probabilidad
          data.gamesWithoutTrigger++;
          if (data.probability < 3) {
            // Subir 0.2% hasta llegar a 3%
            data.probability = Math.min(3, data.probability + 0.2);
          } else if (data.probability < 4) {
            // Subir 0.1% hasta llegar a 4%
            data.probability = Math.min(4, data.probability + 0.1);

          }

          const isWinner = (() => {
            if (winners === 'players') return !p.isImpostor;
            if (winners === 'impostors') return !!p.isImpostor;
            if (winners === 'jester') return !!p.isJester;
            return false;
          })();

          if (isWinner) updatedPlayers[targetKey].wins += 1;
          else updatedPlayers[targetKey].losses += 1;
        });

        const next = {
          players: updatedPlayers,
          totalTimeMs: (stats.totalTimeMs || 0) + durationMs,
          games: (stats.games || 0) + 1
        };
        writeProfileStats(profileId, next);
      }, [winners, selectedProfile, gameStarted, gameStartTs]);

      useEffect(() => {
        if (!showDiscussion) return;
        if (showFinalReveal) return;

        setDiscussionSeconds(0);
        setIsDiscussionPaused(false);

      }, [showDiscussion, showFinalReveal]);

      useEffect(() => {
        if (!showDiscussion) return;
        if (showFinalReveal) return;
        if (isDiscussionPaused) return;

        const interval = setInterval(() => {
          setDiscussionSeconds((prev) => prev + 1);
        }, 1000);

        return () => clearInterval(interval);
      }, [showDiscussion, showFinalReveal, isDiscussionPaused]);

      const revealRole = () => {
        setRoleRevealed(true);
      };

      const nextPlayer = () => {
        const newRevealed = [...revealedPlayers, gameStarted[currentPlayerIndex].number];
        setRevealedPlayers(newRevealed);
        setRoleRevealed(false);
        
        if (currentPlayerIndex + 1 < gameStarted.length) {
          setCurrentPlayerIndex(currentPlayerIndex + 1);
        } else {
          // Ir directamente a la discusión
          selectFirstPlayerAndStartDiscussion();
        }
      };

      const startDiscussion = () => {
        setShowDiscussion(true);
      };

      const votePlayer = (player) => {
        if (anonymousVoting) {
          // Modo anónimo: seleccionar jugador objetivo para el voto actual
          setSelectedVoteTarget(player);
        } else {
          // Modo público: seleccionar jugador para votar (como antes)
          setVotingPlayer(player);
        }
      };

      const startAnonymousVoting = () => {
        setVotingStarted(true);
        setCurrentVotingPlayerIndex(0);
        setAnonymousVotes({});
        setSelectedVoteTarget(null);
        setLockUnlocked(false);
      };

      const confirmAnonymousVote = () => {
        if (!selectedVoteTarget) return;
        
        const activePlayers = gameStarted.filter(p => !p.isEliminated);
        const currentPlayer = activePlayers[currentVotingPlayerIndex];
        
        // Guardar el voto del jugador actual
        setAnonymousVotes(prev => ({
          ...prev,
          [currentPlayer.number]: selectedVoteTarget.number
        }));
        
        // Si hay más jugadores, pasar al siguiente
        if (currentVotingPlayerIndex < activePlayers.length - 1) {
          setCurrentVotingPlayerIndex(prev => prev + 1);
          setSelectedVoteTarget(null);
          setLockUnlocked(false); // Resetear candado para el siguiente jugador
        } else {
          // Todos han votado, calcular y mostrar resultado
          calculateVotingResult();
        }
      };

      const calculateVotingResult = () => {
        // Contar votos
        const voteCounts = {};
        Object.values(anonymousVotes).forEach(votedFor => {
          voteCounts[votedFor] = (voteCounts[votedFor] || 0) + 1;
        });
        
        // Encontrar el más votado
        let maxVotes = 0;
        let mostVotedNumber = null;
        Object.entries(voteCounts).forEach(([playerNum, count]) => {
          if (count > maxVotes) {
            maxVotes = count;
            mostVotedNumber = parseInt(playerNum);
          }
        });
        
        // Si hay empate, usar el primero encontrado
        const playerToEliminate = mostVotedNumber ? gameStarted.find(p => p.number === mostVotedNumber) : null;
        
        if (playerToEliminate) {
          setVotingPlayer(playerToEliminate);
          setRevealingVote(true);
          setShowRevealButton(true);
          setRevealTimer(0);
        }
      };

      const confirmVote = () => {
        if (anonymousVoting) {
          setRevealingVote(true);
          setShowRevealButton(true);
          setRevealTimer(0);
        } else {
          // En modo público, el voto ya se registró, solo mostrar resultado
          setRevealingVote(true);
          setShowRevealButton(true);
          setRevealTimer(0);
        }
      };

      // Función para obtener el jugador más votado en modo público
      const getMostVotedPlayer = () => {
        const voteCounts = {};
        Object.values(publicVotes).forEach(votedFor => {
          voteCounts[votedFor] = (voteCounts[votedFor] || 0) + 1;
        });
        
        let maxVotes = 0;
        let mostVoted = null;
        Object.entries(voteCounts).forEach(([playerNum, count]) => {
          if (count > maxVotes) {
            maxVotes = count;
            mostVoted = parseInt(playerNum);
          }
        });
        
        return mostVoted ? gameStarted.find(p => p.number === mostVoted) : null;
      };

      const continueAfterVote = () => {
        // Determinar qué jugador eliminar
        let playerToEliminate = votingPlayer;
        if (!anonymousVoting && !playerToEliminate) {
          // En modo público, usar el más votado
          playerToEliminate = getMostVotedPlayer();
        }
        
        if (!playerToEliminate) return;
        
        // Verificar si el bufón fue eliminado (gana solo) - ANTES de actualizar el estado
        // REGLA DE BALANCE: Bufón no puede ganar si lo matan en la primera ronda
        if (playerToEliminate.isJester) {
          const updatedPlayers = gameStarted.map(p => 
            p.number === playerToEliminate.number 
              ? { ...p, isEliminated: true }
              : p
          );
          setGameStarted(updatedPlayers);
          setEliminatedPlayers([...eliminatedPlayers, playerToEliminate.number]);
          
          // Si es la primera ronda, el bufón NO gana
          if (roundNumber === 1) {
            // El bufón fue eliminado pero no gana en la primera ronda
            // Mostrar pantalla de revelación con botón "Continuar Juego"
            setVotingPlayer(playerToEliminate);
            setRevealingVote(true);
            setShowRevealButton(true);
            setRevealTimer(0);
            
            // Limpiar votos públicos y resetear estado de votación anónima
            if (!anonymousVoting) {
              setPublicVotes({});
            } else {
              setVotingStarted(false);
              setCurrentVotingPlayerIndex(0);
              setAnonymousVotes({});
              setSelectedVoteTarget(null);
            }
            
            // NO incrementar ronda todavía - se hará cuando se presione "Continuar Juego"
            return;
          }
          
          // Si no es la primera ronda, el bufón gana normalmente
          setWinners('jester');
          // Limpiar votos y estados de votación
          if (!anonymousVoting) {
            setPublicVotes({});
          } else {
            setVotingStarted(false);
            setCurrentVotingPlayerIndex(0);
            setAnonymousVotes({});
            setSelectedVoteTarget(null);
          }
          setVotingPlayer(null);
          setRevealingVote(false);
          setFinalRevealedPlayers([]);
          setCurrentlyRevealingPlayer(null);
          setCardFlipped(false);
          // Mostrar pantalla de victoria del bufón directamente
          setShowFinalReveal(true);
          return;
        }
        
        const updatedPlayers = gameStarted.map(p => 
          p.number === playerToEliminate.number 
            ? { ...p, isEliminated: true }
            : p
        );
        
        setGameStarted(updatedPlayers);
        setEliminatedPlayers([...eliminatedPlayers, playerToEliminate.number]);
        
        // Incrementar número de ronda después de cada eliminación
        setRoundNumber(prev => prev + 1);
        
        // Limpiar votos públicos y resetear estado de votación anónima
        if (!anonymousVoting) {
          setPublicVotes({});
        } else {
          // Resetear estado de votación anónima
          setVotingStarted(false);
          setCurrentVotingPlayerIndex(0);
          setAnonymousVotes({});
          setSelectedVoteTarget(null);
        }
        
        let newImpostorsRemaining = impostorsRemaining;
        // Verificar si el jugador eliminado es un impostor (no el que está votando)
        if (playerToEliminate && playerToEliminate.isImpostor) {
          newImpostorsRemaining = impostorsRemaining - 1;
          setImpostorsRemaining(newImpostorsRemaining);
        }
        
        // Calcular jugadores restantes
        const remainingPlayers = updatedPlayers.filter(p => !p.isEliminated);
        const remainingCount = remainingPlayers.length;
        
        // Si quedan 2 o menos jugadores, terminar automáticamente la partida
        if (remainingCount <= 2) {
          // Calcular jugadores honestos restantes
          const honestPlayersRemaining = remainingPlayers.filter(p => !p.isImpostor).length;
          const impostorsRemainingCount = remainingPlayers.filter(p => p.isImpostor).length;
          
          // Determinar ganadores
          if (newImpostorsRemaining === 0) {
            // No quedan impostores, ganan los jugadores
            setWinners('players');
          } else if (honestPlayersRemaining === 0) {
            // No quedan jugadores honestos, ganan los impostores
            setWinners('impostors');
          } else if (impostorsRemainingCount >= honestPlayersRemaining) {
            // Hay más o igual cantidad de impostores que jugadores honestos, ganan impostores
            setWinners('impostors');
          } else {
            // Hay más jugadores honestos que impostores, ganan jugadores
            setWinners('players');
          }
          
          setFinalRevealedPlayers([]);
          setCurrentlyRevealingPlayer(null);
          setCardFlipped(false);
          setShowFinalReveal(true);
          return;
        }
        
        // Verificar si todos son impostores (después de eliminar)
        const allAreImpostors = remainingPlayers.every(p => p.isImpostor);
        
        // Si todos son impostores y quedan más de 2, continuar la partida
        if (allAreImpostors && remainingCount > 2) {
          setVotingPlayer(null);
          setRevealingVote(false);
          return;
        }
        
        // Calcular jugadores honestos restantes (no eliminados, no impostores, no bufón, no cómplice)
        // El bufón y el cómplice se cuentan como civiles para las condiciones de victoria
        const honestPlayersRemaining = updatedPlayers.filter(p => !p.isEliminated && !p.isImpostor).length;
        const impostorsRemainingCount = updatedPlayers.filter(p => !p.isEliminated && p.isImpostor).length;
        
        // Verificar victoria
        if (newImpostorsRemaining === 0) {
          setWinners('players');
          setFinalRevealedPlayers([]);
          setCurrentlyRevealingPlayer(null);
          setCardFlipped(false);
          setShowFinalReveal(true);
          return;
        } else if (honestPlayersRemaining === 0) {
          // Los impostores ganan solo cuando se eliminan TODOS los inocentes
          setWinners('impostors');
          setFinalRevealedPlayers([]);
          setCurrentlyRevealingPlayer(null);
          setCardFlipped(false);
          setShowFinalReveal(true);
          return;
        } else if (impostorsRemainingCount >= honestPlayersRemaining) {
          // Los impostores ganan cuando igualan o superan la cantidad de jugadores honestos
          setWinners('impostors');
          setFinalRevealedPlayers([]);
          setCurrentlyRevealingPlayer(null);
          setCardFlipped(false);
          setShowFinalReveal(true);
          return;
        }
        
        setVotingPlayer(null);
        setRevealingVote(false);
      };

      const playAgain = () => {
        if (gameStartTs && gameStarted) {
          const winnersKey = winners || computeWinnersFromState();
          recordGameStatsNow(winnersKey);
        }

        setMatchRound(prev => prev + 1);
        
        // Reiniciar directamente una nueva partida con las mismas configuraciones
        // Mantener playerCount, useNames, playerNames, categoryMode, categories, etc.
        // Ajustar impostorCount si es necesario según el nuevo máximo permitido
        const maxImpostors = getMaxImpostors(playerCount);
        if (impostorCount > maxImpostors) {
          setImpostorCount(maxImpostors);
        }
        
        // Reiniciar estados del juego
        setGameStarted(false);
        setCurrentPlayerIndex(0);
        setRevealedPlayers([]);
        setRoleRevealed(false);
        setAllRolesRevealed(false);
        setFirstPlayer(null);
        setShowDiscussion(false);
        setShowFinalReveal(false);
        setFinalRevealedPlayers([]);
        setCurrentlyRevealingPlayer(null);
        setCardFlipped(false);
        setEliminatedPlayers([]);
        setVotingPlayer(null);
        setRevealingVote(false);
        setImpostorsRemaining(0);
        setWinners(null);
        
        // Iniciar directamente una nueva partida
        startGame();
      };

      const goToStart = (skipStats = false) => {
        if (skipStats || abandonedGameRef.current) {
          abandonedGameRef.current = false;
        } else if (gameStartTs && gameStarted) {
          const winnersKey = winners || computeWinnersFromState();
          recordGameStatsNow(winnersKey);
        }

        setMatchRound(1);
        
        setStep(1);
        // Mantener playerCount, useNames y playerNames
        // setPlayerCount(5); - NO resetear
        setCategories([]);
        // Ajustar impostorCount si es necesario según el nuevo máximo permitido
        const maxImpostors = getMaxImpostors(playerCount);
        if (impostorCount > maxImpostors) {
          setImpostorCount(maxImpostors);
        }
        // Mantener useNames y playerNames
        // setUseNames(false); - NO resetear
        // setPlayerNames([]); - NO resetear
        // Mantener opciones guardadas (se cargan automáticamente desde localStorage)
        // setImpostorHints(false); - NO resetear, se mantiene desde localStorage
        // setImpostorNeverFirst(false); - NO resetear, se mantiene desde localStorage
        // setImpostorsKnowEachOther(false); - NO resetear, se mantiene desde localStorage
        setGameStarted(false);
        setCurrentPlayerIndex(0);
        setRevealedPlayers([]);
        setRoleRevealed(false);
        setAllRolesRevealed(false);
        setFirstPlayer(null);
        setShowDiscussion(false);
        setShowFinalReveal(false);
        setFinalRevealedPlayers([]);
        setCurrentlyRevealingPlayer(null);
        setCardFlipped(false);
        setEliminatedPlayers([]);
        setVotingPlayer(null);
        setRevealingVote(false);
        setImpostorsRemaining(0);
        setWinners(null);
        setIsAllImpostorsMode(false);
        setOriginalImpostorCount(0);
        setIsAdditionalImpostorsActive(false);
      };

      const formatClockSeconds = (totalSeconds) => {
        const s = Math.max(0, totalSeconds | 0);
        const mm = String(Math.floor(s / 60)).padStart(2, '0');
        const ss = String(s % 60).padStart(2, '0');
        return `${mm}:${ss}`;
      };

      const computeWinnersFromState = () => {
        const remainingPlayers = gameStarted ? gameStarted.filter(p => !p.isEliminated) : [];
        const honestPlayersRemaining = remainingPlayers.filter(p => !p.isImpostor).length;
        const impostorsRemainingCount = remainingPlayers.filter(p => p.isImpostor).length;

        if (impostorsRemainingCount === 0) return 'players';
        if (honestPlayersRemaining === 0) return 'impostors';
        if (impostorsRemainingCount >= honestPlayersRemaining) return 'impostors';
        return 'players';
      };

      const recordGameStatsNow = (winnersKey) => {
        const profileId = activeProfileIdRef.current || selectedProfile;
        if (!profileId) return;
        if (!gameStarted || !Array.isArray(gameStarted) || gameStarted.length === 0) return;
        if (!gameStartTs) return;
        if (!winnersKey) return;

        const recordKey = `${profileId}_${gameStartTs}_${winnersKey}`;
        if (recordedGameRef.current === recordKey) return;
        recordedGameRef.current = recordKey;

        updateStreakOnGameEnd();

        const durationMs = Math.max(0, Date.now() - gameStartTs);
        const stats = readProfileStats(profileId);
        const updatedPlayers = { ...stats.players };

        gameStarted.forEach((p) => {
          const name = (p && p.name) ? p.name : `Jugador ${p.number}`;
          const emoji = (p && p.emoji) ? p.emoji : '';

          const normalizedName = (name || '').trim().toLowerCase();
          const existingKey = Object.keys(updatedPlayers).find(k => (k || '').trim().toLowerCase() === normalizedName);
          const targetKey = (existingKey && existingKey !== name) ? name : (existingKey || name);

          if (existingKey && existingKey !== targetKey) {
            const existingData = updatedPlayers[existingKey];
            const targetData = updatedPlayers[targetKey];
            const merged = {
              wins: ((existingData && existingData.wins) || 0) + ((targetData && targetData.wins) || 0),
              losses: ((existingData && existingData.losses) || 0) + ((targetData && targetData.losses) || 0),
              emoji: (targetData && targetData.emoji) ? targetData.emoji : ((existingData && existingData.emoji) ? existingData.emoji : '')
            };
            updatedPlayers[targetKey] = merged;
            delete updatedPlayers[existingKey];
          }

          if (!updatedPlayers[targetKey]) {
            updatedPlayers[targetKey] = { wins: 0, losses: 0, emoji };
          } else if (emoji) {
            updatedPlayers[targetKey].emoji = emoji;
          }

          const isWinner = (() => {
            if (winnersKey === 'players') return !p.isImpostor;
            if (winnersKey === 'impostors') return !!p.isImpostor;
            if (winnersKey === 'jester') return !!p.isJester;
            return false;
          })();

          if (isWinner) updatedPlayers[targetKey].wins += 1;
          else updatedPlayers[targetKey].losses += 1;
        });

        const next = {
          players: updatedPlayers,
          totalTimeMs: (stats.totalTimeMs || 0) + durationMs,
          games: (stats.games || 0) + 1
        };
        writeProfileStats(profileId, next);
      };

      const getPlayerDisplay = (player) => {
        const rawEmoji = (player && typeof player.emoji === 'string') ? player.emoji : '';
        const normalizedEmoji = rawEmoji.trim();
        const isEmptyEmoji = !normalizedEmoji;
        const isLettersEmoji = /[a-zA-Z]/.test(normalizedEmoji);

        if (useNames && player && player.name) {
          return (
            <span className="inline-flex items-center gap-2 min-w-0">
              <span
                className={`inline-block ${(isEmptyEmoji ? 'opacity-50' : '')} ${(isLettersEmoji ? (isLightMode ? 'text-blue-600' : 'text-blue-400') : '')}`}
              >
                {normalizedEmoji || '👤'}
              </span>
              <span className="truncate">{player.name}</span>
            </span>
          );
        }

        return `Jugador ${player ? player.number : ''}`;
      };

      const applyCategoryFilters = (cats) => {
        const input = Array.isArray(cats) ? cats : [];
        if (!SETTINGS_FEATURES.kidsSafe && kidsSafeEnabled) return input;
        if (!SETTINGS_FEATURES.avoidSensitive && avoidSensitiveEnabled) return input;
        if (!SETTINGS_FEATURES.complexWords && complexWordsEnabled) return input;
        return input;
      };

      const applyWordFilters = (words) => {
        const input = Array.isArray(words) ? words : [];
        if (!SETTINGS_FEATURES.kidsSafe && kidsSafeEnabled) return input;
        if (!SETTINGS_FEATURES.avoidSensitive && avoidSensitiveEnabled) return input;
        if (!SETTINGS_FEATURES.complexWords && complexWordsEnabled) return input;
        return input;
      };

      const StepIndicator = () => (
        <div className="flex items-center justify-center gap-2 mb-6 sm:mb-8 md:mb-12 flex-wrap px-2 sm:px-4">
          {[1, 2].map((s) => (
            <div key={s} className="flex items-center">
              <div className={`w-8 h-8 sm:w-9 md:w-10 sm:h-9 md:h-10 rounded-full flex items-center justify-center font-bold text-sm sm:text-base md:text-lg transition-all ${
                step >= s 
                  ? 'bg-gradient-to-r from-purple-600 to-pink-600 text-white shadow-lg shadow-purple-500/50' 
                  : `${isLightMode ? 'bg-gray-300 text-gray-600' : 'bg-gray-800 text-gray-400'}`
              }`}>
                {s}
              </div>
              {s < 2 && <div className={`w-6 sm:w-8 h-1 mx-1 ${step > s ? 'bg-gradient-to-r from-purple-600 to-pink-600' : isLightMode ? 'bg-gray-300' : 'bg-gray-800'}`} />}
            </div>
          ))}
        </div>
      );

      return (
        <>
          <ToastContainer />
          {/* Banner de instalación para iOS */}
          {showIOSBanner && (
            <div className={`fixed bottom-0 left-0 right-0 z-50 p-4 ${isLightMode ? 'bg-white border-t-2 border-purple-500' : 'bg-gray-900 border-t-2 border-purple-600'} shadow-2xl`}>
              <div className="max-w-2xl mx-auto flex items-start gap-3">
                <div className="flex-1">
                  {isIOSSafari ? (
                    <>
                      {cameFromOtherBrowser ? (
                        <>
                          <h3 className={`font-semibold text-sm sm:text-base mb-1 ${isLightMode ? 'text-gray-800' : 'text-white'}`}>
                            ✅ ¡Perfecto! Ahora estás en Safari
                          </h3>
                          <p className={`text-xs sm:text-sm ${isLightMode ? 'text-gray-600' : 'text-gray-300'}`}>
                            Para agregar IMPOSTOR ARGENTO a tu pantalla de inicio, toca el botón <span className="font-semibold">Compartir</span> <svg className="inline w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M15 8a3 3 0 10-2.977-2.63l-4.94 2.47a3 3 0 100 4.319l4.94 2.47a3 3 0 10.895-1.789l-4.94-2.47a3.027 3.027 0 000-.74l4.94-2.47C13.456 7.68 14.19 8 15 8z"/></svg> en la parte inferior y selecciona <span className="font-semibold">"Añadir a inicio"</span>
                          </p>
                        </>
                      ) : (
                        <>
                          <h3 className={`font-semibold text-sm sm:text-base mb-1 ${isLightMode ? 'text-gray-800' : 'text-white'}`}>
                            📱 Agrega IMPOSTOR ARGENTO a tu pantalla de inicio
                          </h3>
                          <p className={`text-xs sm:text-sm ${isLightMode ? 'text-gray-600' : 'text-gray-300'}`}>
                            Toca el botón <span className="font-semibold">Compartir</span> <svg className="inline w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M15 8a3 3 0 10-2.977-2.63l-4.94 2.47a3 3 0 100 4.319l4.94 2.47a3 3 0 10.895-1.789l-4.94-2.47a3.027 3.027 0 000-.74l4.94-2.47C13.456 7.68 14.19 8 15 8z"/></svg> en la parte inferior y selecciona <span className="font-semibold">"Añadir a inicio"</span>
                          </p>
                        </>
                      )}
                    </>
                  ) : (
                    <>
                      <h3 className={`font-semibold text-sm sm:text-base mb-1 ${isLightMode ? 'text-gray-800' : 'text-white'}`}>
                        🌐 Usa Safari para instalar IMPOSTOR ARGENTO
                      </h3>
                      <p className={`text-xs sm:text-sm ${isLightMode ? 'text-gray-600' : 'text-gray-300'}`}>
                        Para agregar esta app a tu pantalla de inicio, debes usar <span className="font-semibold">Safari</span>. 
                        <br />
                        <span className="font-semibold">1.</span> Copia la URL de esta página
                        <br />
                        <span className="font-semibold">2.</span> Ábrela en <span className="font-semibold">Safari</span>
                        <br />
                        <span className="font-semibold">3.</span> Toca <span className="font-semibold">Compartir</span> → <span className="font-semibold">"Añadir a inicio"</span>
                      </p>
                    </>
                  )}
                </div>
                <div className="flex-shrink-0 flex items-center gap-2">
                  <button
                    onClick={() => {
                      setShowIOSBanner(false);
                      localStorage.setItem('ios_banner_dismissed', 'true');
                      sessionStorage.setItem('ios_banner_dismissed', 'true');
                    }}
                    className={`text-xs px-2 py-1 rounded ${isLightMode ? 'text-gray-600 hover:bg-gray-100' : 'text-gray-400 hover:bg-gray-800'}`}
                    title="No volver a mostrar"
                  >
                    No mostrar más
                  </button>
                  <button
                    onClick={() => {
                      setShowIOSBanner(false);
                      sessionStorage.setItem('ios_banner_dismissed', 'true');
                    }}
                    className={`p-1 ${isLightMode ? 'text-gray-500 hover:text-gray-700' : 'text-gray-400 hover:text-gray-200'}`}
                    aria-label="Cerrar"
                  >
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          )}
          <div className={`min-h-screen w-full transition-all duration-300 ${isLightMode ? 'bg-gradient-to-br from-gray-100 to-gray-200' : 'bg-black'} text-white p-3 sm:p-4 md:p-6`} style={{minHeight: '100dvh'}}>

                      </button>
                    </>
                  ) : !revealingVote ? (
                    // Pantalla de votación: preguntar jugador por jugador
                    (() => {
                      const activePlayers = gameStarted.filter(p => !p.isEliminated);
                      const currentPlayer = activePlayers[currentVotingPlayerIndex];
                      const totalPlayers = activePlayers.length;
                      const currentPlayerNumber = currentVotingPlayerIndex + 1;
                      // Filtrar el jugador actual de la lista (no puede votarse a sí mismo)
                      const availablePlayers = activePlayers.filter(p => p.number !== currentPlayer.number);
                      
                      return (
                        <div className="text-center py-8 sm:py-12">

                          <div className={`${isLightMode ? 'bg-blue-100 border-2 border-blue-400' : 'bg-blue-900/30 border-2 border-blue-600'} p-6 sm:p-8 rounded-xl mb-6 sm:mb-8`}>
                            <p className={`text-lg sm:text-xl mb-4 ${isLightMode ? 'text-gray-700' : 'text-gray-300'}`}>
                              Jugador {currentPlayerNumber} de {totalPlayers}
                            </p>
                            <p className={`text-2xl sm:text-3xl font-bold mb-4 break-words ${isLightMode ? 'text-blue-600' : 'text-blue-400'}`}>
                              {getPlayerDisplay(currentPlayer)}
                            </p>
                            <p className={`text-base sm:text-lg ${isLightMode ? 'text-gray-600' : 'text-gray-400'}`}>
                              ¿A quién quieres eliminar?
                            </p>
                          </div>

                          {!lockUnlocked ? (
                            // Pantalla del candado
                            <div className={`${isLightMode ? 'bg-gray-100' : 'bg-gray-700/50'} p-8 sm:p-12 rounded-xl mb-6 sm:mb-8`}>
                              <div className="flex flex-col items-center justify-center">
                                <button
                                  onClick={() => setLockUnlocked(true)}
                                  className="mb-6 p-6 sm:p-8 rounded-full bg-gradient-to-r from-yellow-500 to-orange-500 hover:from-yellow-600 hover:to-orange-600 transition-all duration-300 shadow-lg hover:shadow-xl hover:scale-110 active:scale-95"
                                >
                                  <svg className="w-16 h-16 sm:w-20 sm:h-20 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                  </svg>
                                </button>
                                <p className={`text-lg sm:text-xl font-semibold ${isLightMode ? 'text-gray-700' : 'text-gray-300'}`}>
                                  Toca el candado para desbloquear
                                </p>
                                <p className={`text-sm sm:text-base mt-2 ${isLightMode ? 'text-gray-600' : 'text-gray-400'}`}>
                                  Luego podrás seleccionar a quién eliminar
                                </p>
                              </div>
                            </div>
                          ) : (
                            // Lista de jugadores disponibles (sin el jugador actual)
                            <div className={`${isLightMode ? 'bg-gray-100' : 'bg-gray-700/50'} p-4 sm:p-6 rounded-xl mb-6 sm:mb-8`}>
                              <p className={`text-base sm:text-lg mb-3 ${isLightMode ? 'text-gray-700' : 'text-gray-400'}`}>Selecciona un jugador</p>
                              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-4">
                                {availablePlayers.map((player) => (
                                  <button
                                    key={player.number}
                                    onClick={() => !player.isEliminated && votePlayer(player)}
                                    disabled={player.isEliminated}
                                    className={`px-5 py-4 sm:px-6 sm:py-5 rounded-xl text-center font-bold text-base sm:text-lg md:text-xl transition-all duration-300 relative shadow-lg min-h-[100px] sm:min-h-[110px] flex flex-col items-center justify-center ${
                                      player.isEliminated
                                        ? `${isLightMode ? 'bg-gray-300 text-gray-500' : 'bg-gray-800 text-gray-600'} opacity-50 cursor-not-allowed`
                                        : selectedVoteTarget && selectedVoteTarget.number === player.number
                                        ? 'bg-gradient-to-r from-red-600 to-red-700 ring-4 ring-red-400 text-white cursor-pointer shadow-red-500/50'
                                        : 'bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white cursor-pointer ring-2 ring-purple-400 hover:ring-purple-300 shadow-purple-500/50 hover:shadow-xl hover:scale-105'
                                    }`}
                                  >
                                    <div className="break-words w-full px-2 text-base sm:text-lg md:text-xl">
                                      {useNames ? player.name : `Jugador ${player.number}`}
                                    </div>
                                    {selectedVoteTarget && selectedVoteTarget.number === player.number && (
                                      <div className="text-sm sm:text-base mt-2">✓ Seleccionado</div>
                                    )}
                                    {player.isEliminated && (
                                      <div className="text-sm sm:text-base mt-2">💀 Eliminado</div>
                                    )}
                                  </button>
                                ))}
                              </div>
                            </div>
                          )}

                          <div className="flex gap-3 sm:gap-4 justify-center">
                            <button
                              onClick={() => {
                                setVotingStarted(false);
                                setCurrentVotingPlayerIndex(0);
                                setAnonymousVotes({});
                                setSelectedVoteTarget(null);
                                setLockUnlocked(false);

                              Cancelar
                            </button>
                            {lockUnlocked && (
                              <button
                                onClick={confirmAnonymousVote}
                                disabled={!selectedVoteTarget}
                                className={`px-6 sm:px-8 py-3 sm:py-4 rounded-xl font-bold text-base sm:text-lg transition-all duration-300 shadow-lg hover:shadow-xl hover:scale-105 ${

                                    : `${isLightMode ? 'bg-gray-300 text-gray-500' : 'bg-gray-700 text-gray-500'} cursor-not-allowed`
                                }`}
                              >
                                {currentPlayerNumber < totalPlayers ? 'Confirmar y Siguiente' : 'Confirmar Voto Final'}
                              </button>
                            )}
                          </div>
                        </div>

                                    {getPlayerDisplay(votingPlayer)}
                                  </p>
                                  <p className={`text-lg sm:text-xl ${isLightMode ? 'text-gray-600' : 'text-gray-400'}`}>
                                    ha sido eliminado
                                  </p>
                                </div>

                                    setRevealTimer(3);
                                    setRevealProgress(100);
                                    requestAnimationFrame(() => setRevealProgress(0));

                                    const interval = setInterval(() => {
                                      setRevealTimer(prev => (prev <= 0 ? 0 : prev - 1));
                                    }, 1000);

                                    setTimeout(() => {
                                      clearInterval(interval);
                                      setRevealTimer(0);
                                      setShowRevealButton(false);
                                    }, 3000);
                                  }}
                                  className={`w-full py-4 sm:py-5 px-6 sm:px-8 rounded-xl font-bold text-lg sm:text-xl transition-all duration-300 shadow-lg hover:shadow-xl hover:scale-105 ${
                                    revealTimer > 0
                                      ? 'bg-gray-400 text-gray-200 cursor-not-allowed'
                                      : 'bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white'
                                  }`}
                                  disabled={revealTimer > 0}
                                >
                                  {revealTimer > 0 ? (
                                    <RollingOdometerText
                                      value={revealTimer}
                                      className="font-bold"
                                    />
                                  ) : 'Revelar'}
                                </button>
                                {revealTimer > 0 && (
                                  <div className="mt-4">
                                    <div className="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                                      <div
                                        className="bg-gradient-to-r from-purple-600 to-pink-600 h-3 rounded-full ease-linear"
                                        style={{ width: `${revealProgress}%`, transition: 'width 3000ms linear' }}
                                      ></div>
                                    </div>
                                  </div>
                                )}
                              </div>
                            </div>
                      ) : votingPlayer.isJester ? (
                        <div className={`${isLightMode ? 'bg-yellow-100 border-2 border-yellow-400' : 'bg-yellow-900/50 border-2 border-yellow-500'} p-6 sm:p-8 rounded-xl mb-6 flex flex-col items-center`}>
                          <div className="mb-4">
                            <JesterIcon size={80} className={`${isLightMode ? 'text-yellow-600' : 'text-yellow-400'}`} fill={isLightMode ? '#ca8a04' : '#eab308'}/>
                          </div>
                          <p className={`text-2xl sm:text-3xl font-bold mb-4 ${isLightMode ? 'text-yellow-600' : 'text-yellow-400'}`}>
                            {roundNumber === 1 ? '¡Era el Bufón!' : 'Gano el Bufon'}
                          </p>

                            onClick={() => {
                              if (roundNumber === 1) {
                                // Primera ronda: continuar el juego
                                // El bufón ya fue eliminado, solo limpiar estado y continuar
                                setVotingPlayer(null);
                                setRevealingVote(false);
                                setRoundNumber(2);
                                // Limpiar votos para la próxima ronda
                                if (!anonymousVoting) {
                                  setPublicVotes({});
                                } else {
                                  setVotingStarted(false);
                                  setCurrentVotingPlayerIndex(0);
                                  setAnonymousVotes({});
                                  setSelectedVoteTarget(null);
                                }
                              } else {
                                // Otras rondas: mostrar resultados finales
                                setFinalRevealedPlayers(gameStarted.map(p => p.number));
                                setCurrentlyRevealingPlayer(null);
                                setCardFlipped(false);
                                setShowFinalReveal(true);
                                setVotingPlayer(null);
                                setRevealingVote(false);
                              }
                            }}
                            className="px-8 sm:px-12 py-3 sm:py-4 bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-600 hover:to-yellow-700 rounded-xl font-bold text-base sm:text-xl transition-all duration-300 shadow-lg shadow-yellow-500/50 hover:shadow-xl hover:scale-105 text-white"
                          >
                            {roundNumber === 1 ? 'Continuar Juego' : 'Ver Resultados Finales'}
                          </button>
                        </div>
                      ) : (
                            <div className={`p-6 sm:p-8 rounded-xl mb-6 sm:mb-8 ${
                              votingPlayer.isImpostor 
                                ? isLightMode ? 'bg-green-100 border-2 border-green-400' : 'bg-green-900/50 border-2 border-green-600'
                                : isLightMode ? 'bg-red-100 border-2 border-red-400' : 'bg-red-900/50 border-2 border-red-600'
                            }`}>
                              <p className="text-4xl sm:text-5xl mb-4">{votingPlayer.isImpostor ? '🎉' : '😢'}</p>
                              <p className={`text-xl sm:text-2xl font-bold mb-4 break-words ${isLightMode ? 'text-gray-800' : 'text-white'}`}>
                                {getPlayerDisplay(votingPlayer)}
                              </p>
                              {votingPlayer.isImpostor ? (
                                <>
                                  <p className={`text-2xl sm:text-3xl font-bold mb-2 ${isLightMode ? 'text-green-600' : 'text-green-400'}`}>¡ERA IMPOSTOR!</p>
                                  {(() => {
                                    const allAreImpostors = gameStarted && gameStarted.length > 0 && gameStarted.every(p => p.isImpostor);
                                    const newImpostorsRemaining = impostorsRemaining - 1;
                                    
                                    // Mostrar mensaje cuando queden 2 o menos impostores y todos son impostores
                                    if (allAreImpostors && newImpostorsRemaining <= 2) {
                                      return (
                                        <div className={`mt-4 p-4 rounded-xl ${isLightMode ? 'bg-gradient-to-r from-red-500 to-orange-500 border-4 border-red-600' : 'bg-gradient-to-r from-red-700 to-orange-700 border-4 border-red-500'}`}>
                                          <div className="flex justify-center gap-2 mb-2">
                                            <ImpostorIcon size={52} className="text-white" fill="currentColor" />
                                            <ImpostorIcon size={52} className="text-white" fill="currentColor" />
                                            <ImpostorIcon size={52} className="text-white" fill="currentColor" />
                                          </div>
                                          <p className={`text-2xl sm:text-3xl font-bold text-white drop-shadow-lg`}>
                                            ¡TODOS SON IMPOSTORES!
                                          </p>
                                        </div>
                                      );
                                    }
                                    
                                    if (newImpostorsRemaining === 0) {
                                      return (
                                        <p className={`text-xl sm:text-2xl font-bold mt-4 ${isLightMode ? 'text-yellow-600' : 'text-yellow-400'}`}>
                                          🎊 ¡GANARON LOS JUGADORES! 🎊
                                        </p>
                                      );
                                    }
                                    
                                    return null;
                                  })()}
                                </>
                              ) : (
                                <>
                                  <p className={`text-2xl sm:text-3xl font-bold mb-2 ${isLightMode ? 'text-red-600' : 'text-red-400'}`}>Era Inocente...</p>
                                {(() => {
                                  // Calcular jugadores honestos restantes después de eliminar este jugador
                                  const honestPlayersRemaining = gameStarted.filter(p => 
                                    !p.isEliminated && 
                                    p.number !== votingPlayer.number && 
                                    !p.isImpostor
                                  ).length;
                                  // Los impostores ganan solo cuando se eliminan TODOS los inocentes
                                  if (honestPlayersRemaining === 0) {
                                    return (
                                      <p className={`text-xl sm:text-2xl font-bold mt-4 ${isLightMode ? 'text-red-600' : 'text-red-400'}`}>
                                        🎊 ¡GANARON {impostorCount === 1 ? 'EL IMPOSTOR' : 'LOS IMPOSTORES'}! 🎊
                                      </p>
                                    );
                                  }
                                  return null;
                                })()}
                                </>
                              )}
                            </div>
                      )}
                      {(() => {
                        // Calcular si los impostores e inocentes están equilibrados después de eliminar este jugador
                        const remainingPlayers = gameStarted.filter(p => 
                          !p.isEliminated && p.number !== votingPlayer.number
                        );
                        const honestPlayersRemaining = remainingPlayers.filter(p => !p.isImpostor).length;
                        const impostorsRemainingCount = remainingPlayers.filter(p => p.isImpostor).length;
                        const isBalanced = honestPlayersRemaining > 0 && impostorsRemainingCount > 0 && impostorsRemainingCount === honestPlayersRemaining;
                        
                        // Verificar si hay ganadores
                        const hasWinners = (() => {
                          const newImpostorsRemaining = votingPlayer.isImpostor ? impostorsRemaining - 1 : impostorsRemaining;
                          if (newImpostorsRemaining === 0) return true;
                          if (honestPlayersRemaining === 0) return true;
                          if (impostorsRemainingCount >= honestPlayersRemaining) return true;
                          return false;
                        })();
                        
                        // Solo mostrar botón si no estamos en el paso de "Revelar"
                        if (showRevealButton) {
                          return null;
                        }
                        
                        // No mostrar el botón si el bufón fue eliminado (ya se mostró antes)
                        if (votingPlayer && votingPlayer.isJester) {
                          return null;
                        }
                        
                        return (
                          <>
                            <button
                              onClick={() => {
                                if (isBalanced || hasWinners) {
                                  // Si hay ganadores o están equilibrados, ir directamente a resultados finales
                                  setFinalRevealedPlayers(gameStarted.map(p => p.number));
                                  setCurrentlyRevealingPlayer(null);
                                  setCardFlipped(false);
                                  setShowFinalReveal(true);
                                  setVotingPlayer(null);
                                  setRevealingVote(false);
                                  setShowRevealButton(false);
                                  setRevealTimer(0);
                                } else {
                                  continueAfterVote();
                                }
                              }}
                              className="px-8 sm:px-12 py-3 sm:py-4 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 rounded-xl font-bold text-base sm:text-xl transition-all duration-300 shadow-lg shadow-purple-500/50 hover:shadow-xl hover:scale-105"
                            >
                              {(isBalanced || hasWinners) ? 'Ver Resultados Finales' : 'Continuar Juego'}
                            </button>
                            {isBalanced && (
                              <div className={`mt-4 p-3 sm:p-4 rounded-xl text-center ${isLightMode ? 'bg-yellow-50 border-2 border-yellow-400' : 'bg-yellow-900/30 border-2 border-yellow-500'}`}>
                                <p className={`text-sm sm:text-base font-semibold ${isLightMode ? 'text-yellow-800' : 'text-yellow-400'}`}>
                                  ⚖️ Los impostores e inocentes están equilibrados ({impostorsRemainingCount} vs {honestPlayersRemaining}). Los impostores ganan.
                                </p>
                              </div>
                            )}
                          </>
                        );
                      })()}
                    </div>
                  )
                ) : (
                  // Modo público (voto todos juntos)
                  !votingPlayer ? (
                    <>
                      <div className="text-center mb-6 sm:mb-8">
                        <h2 className={`text-3xl sm:text-4xl font-bold mb-2 ${isLightMode ? 'text-gray-800' : 'text-white'}`}>RONDA {roundNumber} - Discusión</h2>
                        <div className={`${isLightMode ? 'bg-gray-100 border border-gray-200' : 'bg-gray-800/40 border border-gray-700'} inline-flex items-center justify-center gap-3 px-5 py-3 rounded-xl mb-3 ${isDiscussionPaused ? 'opacity-70 animate-pulse' : ''}`}
                          role="status"
                          aria-live="polite"
                        >
                          <span className="text-xl">⏱️</span>
                          <RollingOdometerText
                            value={formatClockSeconds(discussionSeconds)}
                            className={`${isLightMode ? 'text-gray-800' : 'text-white'} font-mono font-bold text-2xl tracking-wider`}
                          />
                          {isDiscussionPaused && (
                            <span className={`${isLightMode ? 'text-gray-700' : 'text-gray-300'} text-xs font-bold tracking-widest ml-1`}>
                              PAUSADO
                            </span>
                          )}
                        </div>

                        <p className={`text-lg sm:text-xl ${isLightMode ? 'text-purple-600' : 'text-purple-300'}`}>Voten para eliminar a un jugador</p>
                      </div>

                      <div className="space-y-4 sm:space-y-6 mb-6 sm:mb-8">
                        <div className={`${isLightMode ? 'bg-yellow-100 border-2 border-yellow-400' : 'bg-yellow-900/30 border-2 border-yellow-600'} p-4 sm:p-6 rounded-xl`}>
                          <p className={`text-sm sm:text-base mb-2 ${isLightMode ? 'text-gray-700' : 'text-gray-400'}`}>Comienza la discusión</p>
                          <p className={`text-xl sm:text-2xl font-bold break-words ${isLightMode ? 'text-yellow-600' : 'text-yellow-400'}`}>
                            👉 {getPlayerDisplay(gameStarted.find(p => p.number === firstPlayer))}
                          </p>
                        </div>

                        <div className="grid grid-cols-2 gap-3">
                          <button
                            onClick={() => setIsDiscussionPaused((p) => !p)}
                            className={`px-6 sm:px-8 py-3 sm:py-4 rounded-xl font-bold text-base sm:text-xl transition-all duration-300 shadow-lg hover:shadow-xl hover:scale-105 ${isLightMode ? 'bg-gray-300 hover:bg-gray-400 text-gray-800' : 'bg-gray-700/80 hover:bg-gray-600/90 text-white'}`}
                          >
                            {isDiscussionPaused ? 'Reanudar' : 'Pausar'}
                          </button>
                          <button
                            onClick={() => setShowResultsConfirm(true)}
                            className="px-6 sm:px-8 py-3 sm:py-4 rounded-xl font-bold text-base sm:text-xl transition-all duration-300 shadow-lg shadow-purple-500/50 hover:shadow-xl hover:scale-105 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white"
                          >
                            Terminar
                          </button>
                        </div>

                        <div className={`${isLightMode ? 'bg-gray-100' : 'bg-gray-700/50'} p-4 sm:p-6 rounded-xl`}>
                          <p className={`text-base sm:text-lg mb-3 ${isLightMode ? 'text-gray-700' : 'text-gray-400'}`}>Jugadores (Toca para votar)</p>
                          <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-4">
                            {[...gameStarted].sort((a, b) => a.number - b.number).map((player) => (
                              <button
                                key={player.number}
                                onClick={() => !player.isEliminated && votePlayer(player)}
                                disabled={player.isEliminated}
                                className={`px-5 py-4 sm:px-6 sm:py-5 rounded-xl text-center font-bold text-base sm:text-lg md:text-xl transition-all duration-300 relative shadow-lg min-h-[100px] sm:min-h-[110px] flex flex-col items-center justify-center ${
                                  player.isEliminated
                                    ? `${isLightMode ? 'bg-gray-300 text-gray-500' : 'bg-gray-800 text-gray-600'} opacity-50 cursor-not-allowed`
                                    : 'bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white cursor-pointer ring-2 ring-purple-400 hover:ring-purple-300 shadow-purple-500/50 hover:shadow-xl hover:scale-105'
                                }`}
                              >
                                <div className="break-words w-full px-2 text-base sm:text-lg md:text-xl">
                                  {useNames ? player.name : `Jugador ${player.number}`}
                                </div>
                                {!player.isEliminated && (
                                  <div className="text-sm sm:text-base mt-2 opacity-75">👆 Votar</div>
                                )}
                                {player.isEliminated && (
                                  <div className="text-sm sm:text-base mt-2">💀 Eliminado</div>
                                )}
                              </button>
                            ))}
                          </div>
                        </div>
                      </div>
                    </>
                  ) : !revealingVote ? (
                    <div className="text-center py-8 sm:py-12">
                      <h2 className={`text-2xl sm:text-3xl font-bold mb-6 sm:mb-8 ${isLightMode ? 'text-gray-800' : 'text-white'}`}>Votación</h2>
                      <div className={`${isLightMode ? 'bg-yellow-100 border-2 border-yellow-400' : 'bg-yellow-900/30 border-2 border-yellow-600'} p-6 sm:p-8 rounded-xl mb-6 sm:mb-8`}>
                        <p className={`text-lg sm:text-xl mb-4 ${isLightMode ? 'text-gray-700' : 'text-gray-300'}`}>¿Eliminar a este jugador?</p>
                        <p className={`text-4xl sm:text-5xl font-bold break-words ${isLightMode ? 'text-yellow-600' : 'text-yellow-400'}`}>
                          {getPlayerDisplay(votingPlayer)}
                        </p>
                      </div>
                      <div className="flex gap-3 sm:gap-4 justify-center">
                        <button
                          onClick={() => setVotingPlayer(null)}
                          className={`px-6 sm:px-8 py-3 sm:py-4 rounded-xl font-bold text-base sm:text-lg transition-all duration-300 shadow-lg hover:shadow-xl hover:scale-105 ${isLightMode ? 'bg-gray-300 hover:bg-gray-400 text-gray-800' : 'bg-gray-700/80 hover:bg-gray-600/90 text-white'}`}
                        >
                          Cancelar
                        </button>
                        <button
                          onClick={confirmVote}
                          className="px-6 sm:px-8 py-3 sm:py-4 bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 rounded-xl font-bold text-base sm:text-lg transition-all duration-300 shadow-lg shadow-red-500/50 hover:shadow-xl hover:scale-105"
                        >
                          Confirmar Eliminación
                        </button>
                      </div>
                    </div>

                        <div className={`p-4 rounded-xl border-2 border-purple-500 ${isLightMode ? 'bg-white' : 'bg-gray-900'}`}>
                          <div className={`${isLightMode ? 'text-gray-800' : 'text-white'} text-sm font-bold mb-1`}>Jugador 2</div>
                          <div className={`${isLightMode ? 'text-gray-600' : 'text-gray-300'} text-xs`}>Toca para revelar</div>
